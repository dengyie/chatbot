<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>微信 Bot 消息面板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#ededed;height:100vh;display:flex;flex-direction:column}
.header{background:#07c160;color:#fff;padding:12px 16px;font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px}
.header .dot{width:8px;height:8px;border-radius:50%;background:#fff;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.header .dot.off{background:#ff6b6b;animation:none}
#status{background:#fff;padding:10px 16px;border-bottom:1px solid #e0e0e0;display:none}
#status.show{display:block}
#status .qr{display:flex;align-items:center;gap:12px}
#status .qr img{width:160px;height:160px;border:1px solid #eee;border-radius:4px}
#status .qr .hint{font-size:13px;color:#666;line-height:1.6}
#status .login{color:#07c160;font-size:15px;font-weight:500}
#status .logout{color:#e67e22;font-size:15px}
#status .error{color:#e74c3c;font-size:14px}
#messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.msg{max-width:80%;padding:10px 14px;border-radius:8px;font-size:14px;line-height:1.5;word-break:break-all;position:relative}
.msg.incoming{background:#fff;align-self:flex-start;border-radius:8px 8px 8px 0}
.msg.outgoing{background:#95ec69;align-self:flex-end;border-radius:8px 8px 0 8px}
.msg .meta{font-size:11px;color:#999;margin-bottom:2px}
.msg.outgoing .meta{color:#5a8a3c}
.msg .text{color:#333}
.empty{flex:1;display:flex;align-items:center;justify-content:center;color:#999;font-size:14px}
.footer{background:#f7f7f7;padding:8px 12px;font-size:12px;color:#999;text-align:center;border-top:1px solid #ddd}
</style>
</head>
<body>
<div class="header">
  <div class="dot off" id="dot"></div>
  <span id="title">微信 Bot 消息面板</span>
</div>
<div id="status"></div>
<div id="messages">
  <div class="empty" id="empty">等待连接…</div>
</div>
<div class="footer" id="footer">未连接</div>

<script>
const ws = new WebSocket(`ws://${location.host}/ws`);
const msgs = document.getElementById("messages");
const empty = document.getElementById("empty");
const footer = document.getElementById("footer");
const dot = document.getElementById("dot");
const statusEl = document.getElementById("status");
let count = 0;
let loggedIn = false;

ws.onopen = () => {
  footer.textContent = "已连接 · 等待 Bot 启动";
  footer.style.color = "#07c160";
};

ws.onclose = () => {
  footer.textContent = "连接断开";
  footer.style.color = "#e74c3c";
  dot.className = "dot off";
};

ws.onmessage = (e) => {
  const msg = JSON.parse(e.data);
  if (msg.type === "status") {
    handleStatus(msg);
  } else {
    addMessage(msg);
  }
};

function handleStatus(msg) {
  statusEl.classList.add("show");
  if (empty) empty.remove();

  if (msg.status === "scan") {
    dot.className = "dot off";
    footer.textContent = "等待扫码登录";
    footer.style.color = "#e67e22";
    statusEl.innerHTML = `
      <div class="qr">
        <img src="${msg.qrUrl}" alt="QR Code">
        <div class="hint">
          <div style="font-weight:600;margin-bottom:4px">📱 请用微信扫码登录</div>
          <div>${msg.time}</div>
        </div>
      </div>`;
  } else if (msg.status === "login") {
    loggedIn = true;
    dot.className = "dot";
    footer.textContent = "已登录 · 监听消息中";
    footer.style.color = "#07c160";
    statusEl.innerHTML = `<div class="login">✅ ${msg.text} · ${msg.time}</div>`;
  } else if (msg.status === "logout") {
    loggedIn = false;
    dot.className = "dot off";
    footer.textContent = "已登出";
    footer.style.color = "#e67e22";
    statusEl.innerHTML = `<div class="logout">⚠️ ${msg.text} · ${msg.time}</div>`;
  } else if (msg.status === "error") {
    statusEl.innerHTML = `<div class="error">❌ ${msg.text} · ${msg.time}</div>`;
  }
}

function addMessage(msg) {
  if (empty) empty.remove();
  if (!loggedIn) return;
  count++;
  document.getElementById("title").textContent = `微信 Bot 消息面板 (${count})`;

  const div = document.createElement("div");
  div.className = `msg ${msg.type}`;
  div.innerHTML = `<div class="meta">${msg.type === "incoming" ? msg.from : "Bot → " + msg.to} · ${msg.time}</div><div class="text">${msg.text}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}
</script>
</body>
</html>
